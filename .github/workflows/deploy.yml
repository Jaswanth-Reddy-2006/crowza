name: Deploy Crowza Platform
on:
  push:
    branches: [main]

env:
  PROJECT_ID: crowza
  REGION: us-central1
  GAR_LOCATION: us-central1
  REPOSITORY: venue-images

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Configure Docker'
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # --- BACKEND ---
      - name: Build and Push Backend
        run: |
          docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-backend -f apps/backend/docker/Dockerfile .
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-backend

      - name: Deploy Backend
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'venue-backend'
          image: '${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-backend'
          region: '${{ env.REGION }}'
          flags: '--allow-unauthenticated --port 3000'

      # --- ORGANIZER WEB ---
      - name: Build and Push Organizer
        run: |
          docker build \
            --build-arg VITE_API_URL=https://venue-backend-crowza.a.run.app \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-organizer-web \
            -f apps/organizer-web/docker/Dockerfile .
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-organizer-web

      - name: Deploy Organizer
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'venue-organizer-web'
          image: '${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-organizer-web'
          region: '${{ env.REGION }}'
          flags: '--allow-unauthenticated --port 8080'

      # --- ATTENDEE MOBILE (WEB) ---
      - name: Build and Push Attendee
        run: |
          docker build \
            --build-arg EXPO_PUBLIC_API_URL=https://venue-backend-crowza.a.run.app \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-attendee-web \
            -f apps/attendee-mobile/docker/Dockerfile .
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-attendee-web

      - name: Deploy Attendee
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'venue-attendee-web'
          image: '${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-attendee-web'
          region: '${{ env.REGION }}'
          flags: '--allow-unauthenticated --port 8080'

      # --- STAFF MOBILE (WEB) ---
      - name: Build and Push Staff
        run: |
          docker build \
            --build-arg EXPO_PUBLIC_API_URL=https://venue-backend-crowza.a.run.app \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-staff-web \
            -f apps/staff-mobile/docker/Dockerfile .
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-staff-web

      - name: Deploy Staff
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'venue-staff-web'
          image: '${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/venue-staff-web'
          region: '${{ env.REGION }}'
          flags: '--allow-unauthenticated --port 8080'
