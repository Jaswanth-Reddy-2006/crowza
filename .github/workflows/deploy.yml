name: Deploy Crowza Platform
on:
  push:
    branches: [main]

env:
  PROJECT_ID: crowza
  REGION: us-central1

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Configure Docker'
        run: gcloud auth configure-docker --quiet



      # --- BACKEND ---
      - name: Build and Push Backend
        run: |
          docker build -t gcr.io/${{ env.PROJECT_ID }}/venue-backend -f apps/backend/docker/Dockerfile .
          docker push gcr.io/${{ env.PROJECT_ID }}/venue-backend

      - name: Deploy Backend
        id: deploy-backend
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'venue-backend'
          image: 'gcr.io/${{ env.PROJECT_ID }}/venue-backend'
          region: ${{ env.REGION }}

      # --- ORGANIZER WEB ---
      - name: Build and Push Organizer Web
        run: |
          docker build -t gcr.io/${{ env.PROJECT_ID }}/venue-organizer-web \
            --build-arg VITE_API_URL=${{ steps.deploy-backend.outputs.url }}/api \
            -f apps/organizer-web/docker/Dockerfile .
          docker push gcr.io/${{ env.PROJECT_ID }}/venue-organizer-web

      - name: Deploy Organizer Web
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'venue-organizer-web'
          image: 'gcr.io/${{ env.PROJECT_ID }}/venue-organizer-web'
          region: ${{ env.REGION }}

      # --- ATTENDEE MOBILE WEB ---
      - name: Build and Push Attendee Web
        run: |
          docker build -t gcr.io/${{ env.PROJECT_ID }}/venue-attendee-web \
            --build-arg EXPO_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }}/api \
            -f apps/attendee-mobile/docker/Dockerfile .
          docker push gcr.io/${{ env.PROJECT_ID }}/venue-attendee-web

      - name: Deploy Attendee Web
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'venue-attendee-web'
          image: 'gcr.io/${{ env.PROJECT_ID }}/venue-attendee-web'
          region: ${{ env.REGION }}

      # --- STAFF MOBILE WEB ---
      - name: Build and Push Staff Web
        run: |
          docker build -t gcr.io/${{ env.PROJECT_ID }}/venue-staff-web \
            --build-arg EXPO_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }}/api \
            -f apps/staff-mobile/docker/Dockerfile .
          docker push gcr.io/${{ env.PROJECT_ID }}/venue-staff-web

      - name: Deploy Staff Web
        uses: 'google-github-actions/deploy-cloudrun@v1'
        with:
          service: 'venue-staff-web'
          image: 'gcr.io/${{ env.PROJECT_ID }}/venue-staff-web'
          region: ${{ env.REGION }}
